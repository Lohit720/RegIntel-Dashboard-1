kind = "web"
previewPath = "/"
title = "RegIntel"
version = "1.0.0"
id = "artifacts/regintel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25318

[services.development]
run = "pnpm --filter @workspace/regintel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/regintel", "run", "build" ]
publicDir = "artifacts/regintel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25318"
BASE_PATH = "/"
